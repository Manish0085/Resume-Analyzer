server {
    listen 80;
    server_name ai-resume-analyze.duckdns.org;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ai-resume-analyze.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ai-resume-analyze.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-resume-analyze.duckdns.org/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://react_app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://springboot_app:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /login/ {
        proxy_pass http://springboot_app:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /oauth2/ {
        proxy_pass http://springboot_app:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}