events {}

http {

  upstream frontend {
      server frontend:80;
  }

  upstream backend {
      server backend:8081;
  }

  server {
      listen 80;

      client_max_body_size 50M;

      location / {
          proxy_pass http://frontend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location /api/ {
          proxy_pass http://backend/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

  }

}