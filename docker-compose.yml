version: "3.8"

services:
  backend:
    build: ./backend
    container_name: springboot_app
    restart: always
    expose:
      - "8081"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: react_app
    restart: always
    expose:
      - "80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
